services:
  mongodb:
    container_name: mongo-service
    image: mongo:latest
    volumes:
      - /home/ubuntu/wanderlust/data:/data
    ports:
      - "27017:27017"

  backend:
    container_name: backend
    image: manishvishwa801/wanderlust-backend-beta:latest
    env_file:
      - ./backend.env
    ports:
      - "31100:8080"
    depends_on:
      - mongodb

  frontend:
    container_name: frontend
    image: manishvishwa801/wanderlust-frontend-beta:latest
    env_file:
      - ./frontend.env
    ports:
      - "5173:5173"

  redis:
    container_name: redis-service
    restart: unless-stopped
    image: redis:7.0.5-alpine
    expose:
      - 6379
    depends_on:
      - mongodb
