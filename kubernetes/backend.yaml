apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: wanderlust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: manishvishwa801/wanderlust-backend-beta:latest
          ports:
            - containerPort: 8080
          env:
            - name: MONGODB_URI
              value: "mongodb://mongo-service:27017/wanderlust"
            - name: REDIS_URL
              value: "redis://redis-service:6379"
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: wanderlust
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30000
